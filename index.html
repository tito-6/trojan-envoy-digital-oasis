<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trojan Envoy Digital - Web Development & Digital Marketing Agency</title>
    <meta name="description" content="Professional web development, digital marketing, and design services to help your business grow online." />
    <meta name="theme-color" content="#000000" />
    
    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="/src/index.css" as="style" />
    <link rel="dns-prefetch" href="https://cdn.gpteng.co" />
    
    <!-- Resource hints for critical assets -->
    <link rel="preload" href="/src/App.css" as="style" />
    <link rel="preload" href="/src/main.tsx" as="script" />
    
    <!-- Adaptive loading -->
    <link rel="preload" fetchpriority="high" as="image" href="/public/images/og-image.jpg" type="image/jpeg" />
    
    <!-- SEO Meta Tags -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Trojan Envoy Digital" />
    <meta name="keywords" content="web development, digital marketing, SEO, web design, branding" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Trojan Envoy Digital - Web Development & Marketing Agency" />
    <meta property="og:description" content="Professional web development, digital marketing, and design services to help your business grow online." />
    <meta property="og:image" content="/public/images/og-image.jpg" />
    <meta property="og:url" content="https://trojanenvoy.com" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Trojan Envoy Digital" />
    <meta name="twitter:description" content="Professional web development and digital marketing services" />
    <meta name="twitter:image" content="/public/images/og-image.jpg" />
    
    <!-- Accessibility -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>You need to enable JavaScript to run this application.</noscript>
    
    <!-- Preload critical scripts -->
    <link rel="modulepreload" href="/src/main.tsx" />
    <script type="module" src="/src/main.tsx" async></script>
  </body>
</html>
